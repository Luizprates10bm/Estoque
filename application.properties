# Conexão usando a porta 3309 e sem senha
spring.datasource.url=jdbc:mysql://localhost:3309/estoque_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# Deixe o campo abaixo vazio após o sinal de igual
spring.datasource.password=

# Configurações de Driver e Hibernate
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate - Cria as tabelas e mostra o SQL no console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true